<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Biblique - Administration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        h2 {
            color: #555;
            margin: 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #f5576c;
        }

        .section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .question-card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #f5576c;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .control-btn {
            display: inline-block;
            width: auto;
            margin: 5px;
            padding: 10px 20px;
        }

        .btn-start { background: #4CAF50; }
        .btn-next { background: #2196F3; }
        .btn-end { background: #f44336; }

        .scores-list {
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        .game-code {
            font-size: 32px;
            text-align: center;
            padding: 20px;
            background: #333;
            color: white;
            border-radius: 10px;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Administration du Quiz</h1>

        <div class="section">
            <h2>Code de partie</h2>
            <div class="game-code">BIBLE2024</div>
        </div>

        <div class="section">
            <h2>Ajouter une question</h2>
            <input type="text" id="questionText" placeholder="La question">
            <input type="text" id="option1" placeholder="Option 1">
            <input type="text" id="option2" placeholder="Option 2">
            <input type="text" id="option3" placeholder="Option 3">
            <input type="text" id="option4" placeholder="Option 4">
            <input type="number" id="correctAnswer" placeholder="Bonne réponse (1-4)" min="1" max="4">
            <button onclick="addQuestion()">➕ Ajouter la question</button>
        </div>

        <div class="section">
            <h2>Questions</h2>
            <div id="questionsList"></div>
        </div>

        <div class="section">
            <h2>Contrôles</h2>
            <button class="control-btn btn-start" onclick="startGame()">▶ Démarrer la partie</button>
            <button class="control-btn btn-next" onclick="nextQuestion()">⏭ Question suivante</button>
            <button class="control-btn btn-end" onclick="endGame()">■ Terminer</button>
        </div>

        <div class="section">
            <h2>Scores</h2>
            <div class="scores-list" id="scoresDisplay">
                Aucun joueur pour le moment
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let currentQuestionIndex = -1;

        // Charger les questions sauvegardées
        function loadQuestions() {
            const saved = localStorage.getItem('quiz_questions');
            if (saved) {
                questions = JSON.parse(saved);
                displayQuestions();
            }
        }

        // Ajouter une question
        function addQuestion() {
            const question = {
                id: Date.now(),
                text: document.getElementById('questionText').value,
                options: [
                    document.getElementById('option1').value,
                    document.getElementById('option2').value,
                    document.getElementById('option3').value,
                    document.getElementById('option4').value
                ],
                correct: parseInt(document.getElementById('correctAnswer').value)
            };

            if (question.text && question.options.every(o => o) && question.correct) {
                questions.push(question);
                localStorage.setItem('quiz_questions', JSON.stringify(questions));
                displayQuestions();
                clearForm();
                alert('Question ajoutée !');
            } else {
                alert('Remplis tous les champs !');
            }
        }

        // Afficher les questions
        function displayQuestions() {
            let html = '';
            questions.forEach((q, index) => {
                html += `
                    <div class="question-card">
                        <strong>Question ${index + 1}:</strong> ${q.text}<br>
                        <small>1. ${q.options[0]} | 2. ${q.options[1]} | 3. ${q.options[2]} | 4. ${q.options[3]}</small><br>
                        <small>✅ Réponse: ${q.correct}</small>
                    </div>
                `;
            });
            document.getElementById('questionsList').innerHTML = html || 'Aucune question';
        }

        // Démarrer la partie
        function startGame() {
            if (questions.length === 0) {
                alert('Ajoute des questions d\'abord !');
                return;
            }
            currentQuestionIndex = 0;
            localStorage.setItem('quiz_gameState', JSON.stringify({
                status: 'started'
            }));
            alert('Partie démarrée !');
        }

        // Question suivante
        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                localStorage.setItem('quiz_gameState', JSON.stringify({
                    status: 'question',
                    currentQuestion: questions[currentQuestionIndex]
                }));
            } else {
                endGame();
            }
        }

        // Terminer la partie
        function endGame() {
            localStorage.setItem('quiz_gameState', JSON.stringify({
                status: 'ended'
            }));
            alert('Partie terminée !');
        }

        // Afficher les scores
        function updateScores() {
            const scores = JSON.parse(localStorage.getItem('quiz_scores')) || {};
            let html = '<ul>';
            for (let [player, score] of Object.entries(scores)) {
                html += `<li><strong>${player}</strong>: ${score} points</li>`;
            }
            html += '</ul>';
            document.getElementById('scoresDisplay').innerHTML = html || 'Aucun joueur';
        }

        function clearForm() {
            document.getElementById('questionText').value = '';
            document.getElementById('option1').value = '';
            document.getElementById('option2').value = '';
            document.getElementById('option3').value = '';
            document.getElementById('option4').value = '';
            document.getElementById('correctAnswer').value = '';
        }

        // Initialisation
        loadQuestions();
        setInterval(updateScores, 2000);
    </script>
</body>
</html>
