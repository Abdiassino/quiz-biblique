<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu Biblique - Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #333;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            background: #444;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
        }
        input, button, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
        }
        button {
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.8;
        }
        .question-item {
            background: #555;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }
        .btn-start { background: #4CAF50; }
        .btn-next { background: #FF9800; }
        .btn-end { background: #f44336; }
        h2 { color: #FFD700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Administration du Jeu</h1>
        
        <!-- Code de partie -->
        <div class="section">
            <h2>📌 Code de partie</h2>
            <div style="background: #FFD700; color: black; padding: 20px; text-align: center; font-size: 32px; border-radius: 10px;">
                BIBLE2024
            </div>
        </div>

        <!-- Ajouter une question -->
        <div class="section">
            <h2>➕ Ajouter une question</h2>
            <input type="text" id="questionText" placeholder="Question">
            <input type="text" id="option1" placeholder="Option 1">
            <input type="text" id="option2" placeholder="Option 2">
            <input type="text" id="option3" placeholder="Option 3">
            <input type="text" id="option4" placeholder="Option 4">
            <select id="correctAnswer">
                <option value="1">Option 1 est correcte</option>
                <option value="2">Option 2 est correcte</option>
                <option value="3">Option 3 est correcte</option>
                <option value="4">Option 4 est correcte</option>
            </select>
            <button onclick="addQuestion()">AJOUTER LA QUESTION</button>
        </div>

        <!-- Liste des questions -->
        <div class="section">
            <h2>📋 Questions</h2>
            <div id="questionsList"></div>
        </div>

        <!-- Contrôles du jeu -->
        <div class="section">
            <h2>🎮 Contrôles</h2>
            <button class="btn-start" onclick="startGame()">▶ DÉMARRER LA PARTIE</button>
            <button class="btn-next" onclick="nextQuestion()">⏭ QUESTION SUIVANTE</button>
            <button class="btn-end" onclick="endGame()">■ TERMINER</button>
        </div>

        <!-- Scores -->
        <div class="section">
            <h2>🏆 Scores</h2>
            <div id="scoresList"></div>
        </div>

        <!-- Réinitialiser -->
        <div class="section">
            <h2>⚠️ Danger Zone</h2>
            <button onclick="resetAll()" style="background: #f44336;">TOUT RÉINITIALISER</button>
        </div>
    </div>

    <script>
        // ============================================
        // CODE SIMPLE QUI MARCHE À 100%
        // ============================================

        let questions = [];
        let currentQuestionIndex = -1;

        // Charger les questions au démarrage
        function loadQuestions() {
            let saved = localStorage.getItem('questions');
            if (saved) {
                questions = JSON.parse(saved);
            }
            displayQuestions();
        }

        // Ajouter une question
        function addQuestion() {
            let question = {
                id: Date.now(),
                text: document.getElementById('questionText').value,
                options: [
                    document.getElementById('option1').value,
                    document.getElementById('option2').value,
                    document.getElementById('option3').value,
                    document.getElementById('option4').value
                ],
                correct: parseInt(document.getElementById('correctAnswer').value)
            };

            // Vérifier que tous les champs sont remplis
            if (!question.text || !question.options[0] || !question.options[1] || 
                !question.options[2] || !question.options[3]) {
                alert('Remplis tous les champs !');
                return;
            }

            questions.push(question);
            localStorage.setItem('questions', JSON.stringify(questions));
            
            // Vider le formulaire
            document.getElementById('questionText').value = '';
            document.getElementById('option1').value = '';
            document.getElementById('option2').value = '';
            document.getElementById('option3').value = '';
            document.getElementById('option4').value = '';
            document.getElementById('correctAnswer').value = '1';
            
            displayQuestions();
            alert('Question ajoutée !');
        }

        // Afficher les questions
        function displayQuestions() {
            let html = '';
            for (let i = 0; i < questions.length; i++) {
                html += '<div class="question-item">';
                html += '<strong>' + (i+1) + '. ' + questions[i].text + '</strong><br>';
                html += '<small>1. ' + questions[i].options[0] + ' | ';
                html += '2. ' + questions[i].options[1] + ' | ';
                html += '3. ' + questions[i].options[2] + ' | ';
                html += '4. ' + questions[i].options[3] + '</small><br>';
                html += '<small>✅ Bonne réponse: ' + questions[i].correct + '</small><br>';
                html += '<button onclick="deleteQuestion(' + questions[i].id + ')" style="background: #f44336; width: auto;">Supprimer</button>';
                html += '</div>';
            }
            if (questions.length === 0) {
                html = '<p>Aucune question pour le moment.</p>';
            }
            document.getElementById('questionsList').innerHTML = html;
        }

        // Supprimer une question
        function deleteQuestion(id) {
            if (confirm('Supprimer cette question ?')) {
                let newQuestions = [];
                for (let i = 0; i < questions.length; i++) {
                    if (questions[i].id !== id) {
                        newQuestions.push(questions[i]);
                    }
                }
                questions = newQuestions;
                localStorage.setItem('questions', JSON.stringify(questions));
                displayQuestions();
            }
        }

        // Démarrer la partie
        function startGame() {
            if (questions.length === 0) {
                alert('Ajoute des questions d\'abord !');
                return;
            }
            currentQuestionIndex = 0;
            localStorage.setItem('gameState', JSON.stringify({
                status: 'started'
            }));
            alert('Partie démarrée !');
        }

        // Question suivante
        function nextQuestion() {
            if (questions.length === 0) {
                alert('Pas de questions !');
                return;
            }
            
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
            } else {
                // Retour au début ou fin
                if (confirm('Dernière question ! Revenir au début ?')) {
                    currentQuestionIndex = 0;
                } else {
                    return;
                }
            }
            
            // Envoyer la question
            localStorage.setItem('gameState', JSON.stringify({
                status: 'question',
                question: questions[currentQuestionIndex]
            }));
            
            alert('Question ' + (currentQuestionIndex + 1) + ' envoyée !');
        }

        // Terminer la partie
        function endGame() {
            localStorage.setItem('gameState', JSON.stringify({
                status: 'ended'
            }));
            alert('Partie terminée !');
        }

        // Afficher les scores
        function displayScores() {
            let scores = JSON.parse(localStorage.getItem('scores')) || {};
            let html = '<table style="width:100%; color:white;">';
            
            // Trier les scores
            let sorted = [];
            for (let name in scores) {
                sorted.push({name: name, score: scores[name]});
            }
            
            // Tri manuel
            for (let i = 0; i < sorted.length; i++) {
                for (let j = i+1; j < sorted.length; j++) {
                    if (sorted[i].score < sorted[j].score) {
                        let temp = sorted[i];
                        sorted[i] = sorted[j];
                        sorted[j] = temp;
                    }
                }
            }
            
            for (let i = 0; i < sorted.length; i++) {
                html += '<tr><td>' + (i+1) + '. ' + sorted[i].name + '</td><td>' + sorted[i].score + ' pts</td></tr>';
            }
            if (sorted.length === 0) {
                html += '<tr><td colspan="2">Aucun score</td></tr>';
            }
            html += '</table>';
            document.getElementById('scoresList').innerHTML = html;
        }

        // Tout réinitialiser
        function resetAll() {
            if (confirm('⚠️ Êtes-vous sûr de vouloir TOUT effacer ?')) {
                localStorage.clear();
                questions = [];
                displayQuestions();
                displayScores();
                alert('Tout a été effacé !');
            }
        }

        // Mise à jour automatique des scores
        setInterval(displayScores, 2000);

        // Chargement initial
        loadQuestions();
        displayScores();
    </script>
</body>
</html>
