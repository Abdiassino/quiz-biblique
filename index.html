<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Biblique - Joueurs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .question-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .question-text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .option-btn {
            background: white;
            border: 2px solid #667eea;
            color: #333;
            text-align: left;
            margin: 8px 0;
            padding: 15px;
            border-radius: 10px;
        }

        .option-btn.correct {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .option-btn.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .waiting-spinner {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 QUIZ BIBLIQUE</h1>
        
        <!-- Écran de connexion -->
        <div id="loginScreen" class="screen active">
            <h2 style="margin-bottom: 20px;">Bienvenue !</h2>
            <input type="text" id="playerName" placeholder="Ton prénom">
            <input type="text" id="gameCode" placeholder="Code de la partie" value="BIBLE2024">
            <button onclick="joinGame()">Rejoindre la partie</button>
        </div>

        <!-- Écran d'attente -->
        <div id="waitScreen" class="screen">
            <div class="waiting-spinner">
                <h2>En attente du début...</h2>
                <div class="spinner"></div>
                <p style="margin-top: 20px;" id="waitPlayerName"></p>
            </div>
        </div>

        <!-- Écran de jeu -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <span>👤 <span id="playerNameDisplay"></span></span>
                <span>⭐ Score: <span id="playerScore">0</span></span>
            </div>
            
            <div class="question-box">
                <div class="question-text" id="questionText">Chargement...</div>
                <div id="optionsContainer"></div>
            </div>
        </div>

        <!-- Écran de résultat -->
        <div id="resultScreen" class="screen">
            <h2 id="resultMessage" style="text-align: center; margin: 30px 0;"></h2>
            <button onclick="backToGame()">Continuer</button>
        </div>

        <!-- Écran de fin -->
        <div id="endScreen" class="screen">
            <h2 style="text-align: center; margin: 30px 0;">Partie terminée !</h2>
            <h3 style="text-align: center; margin: 20px;">Score final: <span id="finalScore">0</span></h3>
            <button onclick="resetToLogin()">Nouvelle partie</button>
        </div>
    </div>

    <script>
        // Variables du jeu
        let playerName = '';
        let playerScore = 0;
        let hasAnswered = false;
        let gameState = null;

        // Connexion du joueur
        function joinGame() {
            playerName = document.getElementById('playerName').value;
            const gameCode = document.getElementById('gameCode').value;

            if (!playerName || gameCode !== 'BIBLE2024') {
                alert('Nom invalide ou code incorrect');
                return;
            }

            document.getElementById('playerNameDisplay').textContent = playerName;
            document.getElementById('waitPlayerName').textContent = `Joueur: ${playerName}`;
            
            // Enregistrer le joueur
            const players = JSON.parse(localStorage.getItem('quiz_players')) || [];
            if (!players.includes(playerName)) {
                players.push(playerName);
                localStorage.setItem('quiz_players', JSON.stringify(players));
            }

            showScreen('waitScreen');
            checkGameState();
        }

        // Vérifier l'état du jeu
        function checkGameState() {
            setInterval(() => {
                const state = localStorage.getItem('quiz_gameState');
                if (state) {
                    const newState = JSON.parse(state);
                    if (JSON.stringify(newState) !== JSON.stringify(gameState)) {
                        gameState = newState;
                        handleGameState();
                    }
                }
            }, 1000);
        }

        // Gérer l'état du jeu
        function handleGameState() {
            switch(gameState.status) {
                case 'started':
                    showScreen('gameScreen');
                    playerScore = 0;
                    document.getElementById('playerScore').textContent = '0';
                    break;
                case 'question':
                    displayQuestion(gameState.currentQuestion);
                    break;
                case 'ended':
                    document.getElementById('finalScore').textContent = playerScore;
                    showScreen('endScreen');
                    break;
            }
        }

        // Afficher une question
        function displayQuestion(question) {
            hasAnswered = false;
            document.getElementById('questionText').textContent = question.text;
            
            let html = '';
            question.options.forEach((opt, index) => {
                html += `<button class="option-btn" onclick="answerQuestion(${index + 1}, ${question.correct})">${index + 1}. ${opt}</button>`;
            });
            
            document.getElementById('optionsContainer').innerHTML = html;
        }

        // Répondre à une question
        function answerQuestion(choice, correct) {
            if (hasAnswered) return;
            hasAnswered = true;

            const buttons = document.querySelectorAll('.option-btn');
            
            if (choice === correct) {
                playerScore += 10;
                buttons[choice-1].classList.add('correct');
                document.getElementById('resultMessage').textContent = '✅ Bonne réponse ! +10 points';
            } else {
                buttons[choice-1].classList.add('incorrect');
                buttons[correct-1].classList.add('correct');
                document.getElementById('resultMessage').textContent = '❌ Mauvaise réponse';
            }

            document.getElementById('playerScore').textContent = playerScore;
            
            // Sauvegarder le score
            const scores = JSON.parse(localStorage.getItem('quiz_scores')) || {};
            scores[playerName] = playerScore;
            localStorage.setItem('quiz_scores', JSON.stringify(scores));

            showScreen('resultScreen');
        }

        function backToGame() {
            showScreen('gameScreen');
        }

        function resetToLogin() {
            playerScore = 0;
            showScreen('loginScreen');
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
