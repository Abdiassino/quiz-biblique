<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu Biblique - Joueur</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #2196F3;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .screen {
            display: none;
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .screen.active {
            display: block;
        }
        input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #4CAF50;
            color: white;
            font-weight: bold;
        }
        .option-btn {
            background: #f0f0f0;
            color: black;
            text-align: left;
            margin: 5px 0;
            border: 1px solid #ddd;
        }
        .option-btn.correct {
            background: #4CAF50;
            color: white;
        }
        .option-btn.incorrect {
            background: #f44336;
            color: white;
        }
        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: white;
            color: black;
            padding: 15px;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>
    <h1>📖 JEU BIBLIQUE</h1>
    
    <div class="container">
        <!-- Écran de connexion -->
        <div id="loginScreen" class="screen active">
            <h2>Connexion</h2>
            <input type="text" id="playerName" placeholder="Ton nom">
            <input type="text" id="gameCode" value="BIBLE2024">
            <button onclick="joinGame()">Rejoindre la partie</button>
        </div>

        <!-- Écran d'attente -->
        <div id="waitScreen" class="screen">
            <h2>En attente...</h2>
            <p>Joueur: <span id="displayName"></span></p>
            <div id="playersList"></div>
        </div>

        <!-- Écran de jeu -->
        <div id="gameScreen" class="screen">
            <div class="header">
                <span>Joueur: <span id="gamePlayerName"></span></span>
                <span>Score: <span id="score">0</span></span>
            </div>
            
            <h3 id="questionText">Chargement...</h3>
            <div id="options"></div>
        </div>

        <!-- Écran résultat -->
        <div id="resultScreen" class="screen">
            <h2 id="resultMessage"></h2>
            <button onclick="continueGame()">Continuer</button>
        </div>
    </div>

    <script>
        // Variables
        let playerName = '';
        let playerScore = 0;
        let hasAnswered = false;

        // Fonction pour rejoindre
        function joinGame() {
            playerName = document.getElementById('playerName').value;
            let code = document.getElementById('gameCode').value;
            
            if (!playerName) {
                alert('Entre ton nom !');
                return;
            }
            if (code !== 'BIBLE2024') {
                alert('Code incorrect !');
                return;
            }
            
            document.getElementById('displayName').innerHTML = playerName;
            document.getElementById('gamePlayerName').innerHTML = playerName;
            
            // Sauvegarder le joueur
            let players = JSON.parse(localStorage.getItem('players')) || [];
            if (!players.includes(playerName)) {
                players.push(playerName);
                localStorage.setItem('players', JSON.stringify(players));
            }
            
            showScreen('waitScreen');
        }

        // Vérifier l'état du jeu
        setInterval(function() {
            let state = localStorage.getItem('gameState');
            if (state) {
                let gameState = JSON.parse(state);
                
                if (gameState.status === 'question' && document.getElementById('gameScreen').classList.contains('active')) {
                    showQuestion(gameState.question);
                }
                if (gameState.status === 'ended') {
                    alert('Partie terminée ! Score: ' + playerScore);
                    showScreen('loginScreen');
                }
            }
            
            // Mettre à jour la liste des joueurs
            let players = JSON.parse(localStorage.getItem('players')) || [];
            let html = '<h3>Joueurs:</h3>';
            players.forEach(p => {
                html += '<p>' + p + (p === playerName ? ' (toi)' : '') + '</p>';
            });
            document.getElementById('playersList').innerHTML = html;
        }, 1000);

        // Afficher question
        function showQuestion(q) {
            hasAnswered = false;
            document.getElementById('questionText').innerHTML = q.text;
            
            let html = '';
            for (let i = 0; i < q.options.length; i++) {
                html += '<button class="option-btn" onclick="answer(' + (i+1) + ',' + q.correct + ')">' + 
                        (i+1) + '. ' + q.options[i] + '</button>';
            }
            document.getElementById('options').innerHTML = html;
        }

        // Répondre
        function answer(choice, correct) {
            if (hasAnswered) return;
            hasAnswered = true;
            
            let buttons = document.querySelectorAll('.option-btn');
            
            if (choice === correct) {
                playerScore += 10;
                buttons[choice-1].classList.add('correct');
                document.getElementById('resultMessage').innerHTML = '✅ Bonne réponse! +10 points';
            } else {
                buttons[choice-1].classList.add('incorrect');
                buttons[correct-1].classList.add('correct');
                document.getElementById('resultMessage').innerHTML = '❌ Mauvaise réponse';
            }
            
            document.getElementById('score').innerHTML = playerScore;
            
            // Sauvegarder score
            let scores = JSON.parse(localStorage.getItem('scores')) || {};
            scores[playerName] = playerScore;
            localStorage.setItem('scores', JSON.stringify(scores));
            
            showScreen('resultScreen');
        }

        function continueGame() {
            showScreen('gameScreen');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
